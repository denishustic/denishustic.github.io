<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Manipulacija div elementa JavaScriptom</title>
</head>
<body>

    <div><img src="Slika1.jpg" alt="Prva slika" width="200"></div>
    <div id="drugaSlika"><img src="Slika2.jpg" alt="Druga slika" width="200"></div>
    <div><img src="Slika3.jpg" alt="Treća slika" width="200"></div>

    <input type="button" value="Sakrij" onclick="document.getElementById('drugaSlika').style.visibility='hidden';">
    <input type="button" value="Pokaži" onclick="document.getElementById('drugaSlika').style.visibility='visible';">

</body>
</html>
