<HTML>
<HEAD>
<TITLE>Jednostavni Rollover</TITLE>
<SCRIPT LANGUAGE="JavaScript">
// Inicijalizacija slike za preloading
var zaloadslika = new Image();
zaloadslika.src = "koenigsegg.png"; 
</SCRIPT>
</HEAD>
<BODY>
<A HREF="#" 
onMouseOver="window.document.mojaslika.src=zaloadslika.src;" 
onMouseOut="window.document.mojaslika.src='lamborghini.png';">
<img src="lamborghini.png" name="mojaslika" width="100" height="100" border="0">
</A>
</BODY>
</HTML>
