<html>
<head>
<TITLE> Slide Show </TITLE>
<SCRIPT LANGUAGE="JavaScript">

var slike=new Array();
slike[0]= new Image();
slike[0].src="japan.jpg";

slike[1]= new Image();
slike[1].src="cocktail.jpg";

slike[2]= new Image();
slike[2].src="mclaren.jpg";

slike[3]= new Image();
slike[3].src="mountain.jpg";

var vrijeme;
var indeks=0;
function zamjenisliku()
{
	window.document.mojaslika.src=slike[indeks].src;
	indeks++
	if (indeks >=slike.length)
	{
		indeks=0;
	}
	
	vrijeme=setTimeout("zamjenisliku();",2000);
}

</SCRIPT>
</HEAD>
  
<body>
<center>
<img name="mojaslika" src="japan.jpg" height="700" width="500"   >

<FORM>
<input type="button" value="Započni slide show" onClick="clearTimeout(vrijeme); zamjenisliku();">
<input type="button" value="Zaustavi slide show" onClick="clearTimeout(vrijeme);">
</FORM>
</center>
</body>
</html>
