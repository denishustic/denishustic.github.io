<HTML>
<HEAD>
<TITLE>Vježba 14</TITLE>
<STYLE>
        BODY {
            background-color:#FFFFFF;
        }
		
        .slika {
            position: absolute;
            width: 200px;
            height: 200px;
            z-index: 1;
        }
		
        .slika:hover {
            z-index: 100;
        }

        #img1 { left: 100px; top: 100px; }
        #img2 { left: 200px; top: 200px; }
        #img3 { left: 300px; top: 300px; }
        #img4 { left: 400px; top: 400px; }
        #img5 { left: 500px; top: 500px; }

        button {
            padding: 5px 15px;
            margin: 10px 5px;
            cursor: pointer;
        }
</STYLE>
</HEAD>
<BODY>
    <button onclick="pomakni(-20)">Pomakni lijevo!!</button>
    <button onclick="pomakni(20)">Pomakni desno!!</button>

    <div id="sivi" style="position:absolute; left:50px; top:300px; width:350px; height:400px; background-color:gray;"></div>

    <div><img id="img1" class="slika" src="1.jpg"></div>
    <div><img id="img2" class="slika" src="2.jpg"></div>
    <div><img id="img3" class="slika" src="3.jpg"></div>
    <div><img id="img4" class="slika" src="4.jpg"></div>
    <div><img id="img5" class="slika" src="5.jpg"></div>

<SCRIPT>
        function pomakni(korak) {
            const sivi = document.getElementById('sivi');
            const trenutniLeft = parseInt(sivi.style.left) || 0;
            sivi.style.left = (trenutniLeft + korak) + 'px';
        }
</SCRIPT>
</BODY>
</HTML>
