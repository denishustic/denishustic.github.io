<HTML>
<HEAD>
<title>Vježba 14</title>
<style>
BODY {
            background-color: black;
            margin: 20px;
        }
button {
            padding: 8px 15px;
            margin-right: 10px;
            cursor: pointer;
            background-color: white;
            color: black;
            border: 1px solid black;
            font-size: 16px;
        }
.box {
            position: absolute;
            width: 300px;
            height: 300px;
            background-size: cover;
            background-position: center;
        }
#div1 {
            background-image: url('1.jpg');
            top: 150px;
            left: 100px;
            z-index: 1;
        }
#div2 {
            background-image: url('2.jpg');
            top: 230px;
            left: 180px;
            z-index: 2;
        }
#div3 {
            background-image: url('3.jpg');
            top: 310px;
            left: 260px;
            z-index: 3;
        }
#div4 {
            background-image: url('4.jpg');
            top: 390px;
            left: 440px;
            z-index: 4;
        }
#div5 {
            background-image: url('5.jpg');
            top: 470px;
            left: 580px;
            z-index: 5;
        }
#div6 {
            width: 440px;
            height: 670px;
            background-color: gray;
            top: 170px;
            left: 0px;
            z-index: 0; 
        }
.box:hover {
            z-index: 100;
        }
</style>
</HEAD>
<BODY>
<button onclick="pomakni(20)">Pomakni desno</button>
<button onclick="pomakni(-20)">Pomakni lijevo</button>
    <div id="div1" class="box"></div>
    <div id="div2" class="box"></div>
    <div id="div3" class="box"></div>
    <div id="div4" class="box"></div>
    <div id="div5" class="box"></div>
    <div id="div6" class="box"></div>
<script>
let siviPozicijaLeft = 0;
function pomakni(korak) {
            siviPozicijaLeft += korak;
            document.getElementById('div6').style.left = siviPozicijaLeft + 'px';
        }
</script>
</BODY>
</HTML>
